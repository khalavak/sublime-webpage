<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sofecta Labs | Booking Board</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;700&family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <style>
    :root {
      --bg: #0e0e0e;
      --panel: #171717;
      --panel-2: #1f1f1f;
      --border: rgba(255, 255, 255, 0.14);
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.72);
      --accent: #ffa300;
      --accent-soft: rgba(255, 163, 0, 0.2);
      --danger: #ff5a5a;
      --ok: #31ad60;
      --radius: 14px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Readex Pro", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    a {
      color: inherit;
    }

    .shell {
      max-width: 1800px;
      margin: 0 auto;
      padding: 18px 18px 26px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      background: rgba(12, 12, 12, 0.86);
      border-radius: var(--radius);
      padding: 12px 14px;
      position: sticky;
      top: 10px;
      z-index: 20;
      backdrop-filter: blur(8px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand img {
      height: 34px;
      width: auto;
    }

    .brand h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .btn,
    .btn-link {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 10px;
      padding: 9px 12px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
    }

    .btn:hover,
    .btn-link:hover {
      border-color: rgba(255, 163, 0, 0.54);
      background: rgba(255, 163, 0, 0.14);
    }

    .btn-primary {
      border-color: rgba(255, 163, 0, 0.65);
      background: var(--accent);
      color: #171717;
      font-weight: 700;
    }

    .btn-primary:hover {
      background: #ffb730;
      border-color: #ffb730;
    }

    .layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .panel h2,
    .panel h3 {
      margin: 0 0 10px;
      font-size: 0.98rem;
      font-weight: 600;
    }

    .panel p {
      margin: 0;
      color: var(--text-dim);
      font-size: 0.88rem;
      line-height: 1.35;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .field-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .field label {
      font-family: "DM Sans", sans-serif;
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 0.02em;
    }

    .input,
    .select {
      width: 100%;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: var(--panel-2);
      color: var(--text);
      padding: 9px 10px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.9rem;
      outline: none;
    }

    .input:focus,
    .select:focus {
      border-color: rgba(255, 163, 0, 0.7);
      box-shadow: 0 0 0 2px var(--accent-soft);
    }

    .datetime-wrap {
      position: relative;
    }

    .datetime-wrap .input {
      padding-right: 46px;
    }

    .datepicker-trigger {
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      border-radius: 8px;
      border: 1px solid rgba(255, 163, 0, 0.6);
      background: rgba(255, 163, 0, 0.18);
      color: #ffd28a;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .datepicker-trigger:hover {
      background: rgba(255, 163, 0, 0.28);
      border-color: rgba(255, 163, 0, 0.9);
      color: #fff2dc;
    }

    .inline-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .status {
      font-family: "DM Sans", sans-serif;
      font-size: 0.8rem;
      color: var(--text-dim);
      border: 1px dashed rgba(255, 255, 255, 0.24);
      border-radius: 10px;
      padding: 8px 9px;
    }

    .status:empty {
      display: none;
    }

    .status strong {
      color: #ffe5b7;
    }

    .calendar-table {
      width: 100%;
      border-collapse: collapse;
      font-family: "DM Sans", sans-serif;
      font-size: 0.83rem;
    }

    .calendar-table th,
    .calendar-table td {
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      padding: 8px 4px;
    }

    .calendar-table th {
      color: var(--text-dim);
      font-weight: 500;
    }

    .calendar-table td:last-child,
    .calendar-table th:last-child {
      text-align: right;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(355px, 1fr));
      gap: 12px;
      align-content: start;
    }

    .unified-wrap {
      width: 100%;
      overflow: auto;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(12, 12, 12, 0.75);
      min-height: calc(100vh - 310px);
    }

    .planner-wrap {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(420px, 0.85fr);
      gap: 12px;
      min-height: calc(100vh - 310px);
    }

    .planner-times,
    .planner-month {
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      background: rgba(12, 12, 12, 0.75);
      padding: 12px;
      display: grid;
      gap: 10px;
      align-content: start;
      min-height: 100%;
    }

    .planner-day-title {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #ffe7bf;
    }

    .planner-day-sub {
      margin: 0;
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.82rem;
      font-family: "DM Sans", sans-serif;
    }

    .planner-time-columns {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 10px;
    }

    .planner-person-column {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      padding: 10px;
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .planner-person-head {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      color: #fff;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.16);
      padding-bottom: 8px;
    }

    .planner-time-list {
      display: grid;
      gap: 11px;
      align-content: start;
    }

    .planner-time-row {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      gap: 12px;
      padding: 2px 0;
    }

    .planner-time-secondary {
      font-family: "DM Sans", sans-serif;
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.72);
      white-space: nowrap;
    }

    .planner-time-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 14px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      text-decoration: none;
      color: #fff;
      font-family: "DM Sans", sans-serif;
      font-weight: 600;
      font-size: 0.88rem;
      background: rgba(255, 255, 255, 0.03);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .planner-time-link:hover {
      border-color: var(--chip-color, rgba(255, 163, 0, 0.72));
      background: color-mix(in srgb, var(--chip-color, #ffa300) 22%, transparent);
    }

    .planner-time-empty {
      font-family: "DM Sans", sans-serif;
      color: rgba(255, 255, 255, 0.56);
      font-size: 0.78rem;
      border: 1px dashed rgba(255, 255, 255, 0.14);
      border-radius: 8px;
      padding: 8px;
      text-align: center;
    }

    .month-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .month-label {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      color: #ffe7bf;
      text-align: center;
      flex: 1;
    }

    .month-nav-btn {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.02);
      color: #fff;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
    }

    .month-nav-btn:hover {
      border-color: rgba(255, 163, 0, 0.72);
      background: rgba(255, 163, 0, 0.12);
    }

    .month-weekdays,
    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 6px;
    }

    .month-weekday {
      text-align: center;
      font-size: 0.76rem;
      color: rgba(255, 255, 255, 0.62);
      font-family: "DM Sans", sans-serif;
      padding: 2px 0;
    }

    .month-day {
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.02);
      color: #fff;
      min-height: 68px;
      display: grid;
      align-content: start;
      gap: 3px;
      padding: 8px 7px;
      cursor: pointer;
      text-align: left;
    }

    .month-day:hover {
      border-color: rgba(255, 163, 0, 0.58);
      background: rgba(255, 163, 0, 0.1);
    }

    .month-day.out-month {
      opacity: 0.45;
    }

    .month-day.selected {
      border-color: rgba(255, 163, 0, 0.95);
      box-shadow: inset 0 0 0 1px rgba(255, 163, 0, 0.72);
      background: rgba(255, 163, 0, 0.18);
    }

    .month-day.has-slots .month-day-count {
      color: #ffdeab;
    }

    .month-day-number {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .month-day-count {
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.58);
      font-family: "DM Sans", sans-serif;
    }

    .unified-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 740px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.84rem;
    }

    .unified-table th,
    .unified-table td {
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      border-right: 1px solid rgba(255, 255, 255, 0.06);
      vertical-align: top;
      padding: 8px;
      min-width: 132px;
    }

    .unified-table th:last-child,
    .unified-table td:last-child {
      border-right: none;
    }

    .unified-time {
      width: 94px;
      min-width: 94px;
      text-align: left;
      font-weight: 600;
      color: #ffe4ba;
      background: rgba(255, 163, 0, 0.08);
      position: sticky;
      left: 0;
      z-index: 2;
    }

    .unified-head-time {
      z-index: 3;
      text-align: center;
    }

    .time-dual {
      display: grid;
      gap: 2px;
      line-height: 1.15;
    }

    .time-primary {
      font-size: 0.78rem;
      color: #ffe9c5;
    }

    .time-secondary {
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.72);
    }

    .unified-day-head {
      text-align: left;
      font-weight: 600;
      color: #ffddb0;
      background: rgba(255, 163, 0, 0.08);
    }

    .unified-day-sub {
      display: block;
      margin-top: 3px;
      color: rgba(255, 255, 255, 0.67);
      font-size: 0.73rem;
      font-weight: 400;
    }

    .slot-cell {
      min-height: 54px;
    }

    .slot-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .slot-chip {
      border: 1px solid rgba(255, 255, 255, 0.24);
      border-left-width: 5px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.03);
      color: #fff;
      padding: 5px 7px;
      line-height: 1.2;
      display: grid;
      gap: 2px;
      max-width: 100%;
    }

    .slot-chip .slot-person {
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-person-link {
      color: #ffe7bf;
      text-decoration: underline;
      text-decoration-color: rgba(255, 163, 0, 0.72);
      text-underline-offset: 2px;
      font-weight: 600;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: inline-block;
      max-width: 100%;
    }

    .slot-person-link:hover {
      color: #fff7e7;
      text-decoration-color: rgba(255, 163, 0, 1);
    }

    .slot-chip .slot-name {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.72rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .slot-empty {
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
      padding-top: 10px;
      font-size: 0.8rem;
    }

    .legend-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .person-filter-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .person-filter-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 4px 9px 4px 6px;
      font-family: "DM Sans", sans-serif;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.9);
      background: rgba(255, 255, 255, 0.03);
      cursor: pointer;
      user-select: none;
    }

    .person-filter-item input {
      accent-color: var(--accent);
      margin: 0;
    }

    .filter-actions {
      display: inline-flex;
      gap: 6px;
      margin-right: 3px;
    }

    .btn-mini {
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      color: rgba(255, 255, 255, 0.86);
      font-family: "DM Sans", sans-serif;
      font-size: 0.72rem;
      padding: 4px 8px;
      cursor: pointer;
    }

    .btn-mini:hover {
      border-color: rgba(255, 163, 0, 0.54);
      background: rgba(255, 163, 0, 0.12);
      color: #fff;
    }

    .legend-item {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 999px;
      padding: 4px 9px 4px 6px;
      font-size: 0.77rem;
      font-family: "DM Sans", sans-serif;
      color: rgba(255, 255, 255, 0.88);
      background: rgba(255, 255, 255, 0.02);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: 0 0 12px;
    }

    .person-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      padding: 3px 8px 3px 6px;
      color: rgba(255, 255, 255, 0.92);
      background: rgba(255, 255, 255, 0.02);
      font-size: 0.74rem;
      font-family: "DM Sans", sans-serif;
      white-space: nowrap;
    }

    .calendar-card {
      background: rgba(19, 19, 19, 0.95);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 180px;
      display: flex;
      flex-direction: column;
    }

    .calendar-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 163, 0, 0.08);
    }

    .calendar-card-title {
      margin: 0;
      font-size: 0.92rem;
      font-weight: 600;
      white-space: nowrap;
      text-overflow: ellipsis;
      overflow: hidden;
    }

    .calendar-url {
      color: rgba(255, 255, 255, 0.72);
      font-size: 0.76rem;
      line-height: 1.35;
      word-break: break-all;
    }

    .empty-calendar {
      margin: 18px;
      border: 1px dashed rgba(255, 255, 255, 0.26);
      border-radius: 12px;
      padding: 16px;
      display: grid;
      gap: 8px;
      color: var(--text-dim);
      font-family: "DM Sans", sans-serif;
      font-size: 0.9rem;
    }

    .hint {
      font-size: 0.78rem;
      color: var(--text-dim);
      font-family: "DM Sans", sans-serif;
      line-height: 1.35;
    }

    .mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }

    .danger {
      color: var(--danger);
    }

    .ok {
      color: var(--ok);
    }

    @media (max-width: 1180px) {
      .layout {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 680px) {
      .field-grid {
        grid-template-columns: 1fr;
      }

      .calendar-grid {
        grid-template-columns: 1fr;
      }

      .planner-wrap {
        grid-template-columns: 1fr;
      }

      .topbar {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <img src="/assets/sofecta-logo-full-color.png" alt="Sofecta Labs" />
        <h1>Booking Board</h1>
      </div>
      <div class="topbar-actions">
        <a class="btn-link" href="/">Back to Main Site</a>
        <button class="btn" type="button" id="copy-link-btn">Copy Share Link</button>
      </div>
    </header>

    <div class="layout">
      <main class="stack">
        <section class="panel stack calendar-panel">
          <div class="inline-actions" style="justify-content: space-between; align-items: center;">
            <div>
              <h3>Unified Availability</h3>
              <p>Full-screen calendar board of available times from all linked calendars. Click a name to continue booking in Pipedrive.</p>
            </div>
            <button class="btn" type="button" id="refresh-availability-btn">Refresh Availability</button>
          </div>
          <div class="hint">Business-hours filter is always on: <span class="mono">FI 09:00-17:00</span> and <span class="mono">SE 08:00-16:00</span>.</div>
          <div class="status" id="save-status"></div>
          <div class="legend-list" id="availability-legend"></div>
          <div class="person-filter-wrap" id="person-filter-wrap"></div>
          <div class="status" id="availability-status"></div>
          <div class="planner-wrap">
            <section class="planner-month" id="planner-month"></section>
            <section class="planner-times" id="planner-times"></section>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    (function () {
      const DEFAULT_TIMEZONE = "Europe/Helsinki";
      const CALENDARS_JSON_URL = "/bookings/calendars.json";
      const COLOR_PALETTE = ["#ffa300", "#36a2eb", "#ff6384", "#4bc0c0", "#9966ff", "#ff9f40", "#7bc043", "#f37736"];
      const FI_BUSINESS_START_MINUTES = 9 * 60;
      const FI_BUSINESS_END_MINUTES = 17 * 60;
      const SE_TIME_OFFSET_MINUTES = -60;
      const FI_BUSINESS_LABEL = "09:00-17:00";
      const SE_BUSINESS_LABEL = "08:00-16:00";

      const FALLBACK_CALENDARS = [
        {
          id: "kim",
          name: "Kim",
          color: "#ffa300",
          url: "https://sofectalabsoy.pipedrive.com/scheduler/1BLyLmu8/sublime-demo",
        },
        {
          id: "jan",
          name: "Jan",
          color: "#36a2eb",
          url: "https://sofectalabsoy.pipedrive.com/scheduler/W2p8prUy/sublime-demo",
        },
        {
          id: "amos",
          name: "Amos",
          color: "#ff6384",
          url: "https://sofectalabsoy.pipedrive.com/scheduler/qYLDLlC5/sublime-demo",
        },
      ];

      const els = {
        saveStatus: document.getElementById("save-status"),
        copyLinkBtn: document.getElementById("copy-link-btn"),
        refreshAvailabilityBtn: document.getElementById("refresh-availability-btn"),
        availabilityLegend: document.getElementById("availability-legend"),
        availabilityStatus: document.getElementById("availability-status"),
        plannerTimes: document.getElementById("planner-times"),
        plannerMonth: document.getElementById("planner-month"),
        personFilterWrap: document.getElementById("person-filter-wrap"),
      };

      const state = {
        calendars: [],
        availabilityRequestId: 0,
        availabilityResults: [],
        selectedPersons: new Set(),
        personSelectionInitialized: false,
        selectedDate: "",
        visibleMonthKey: "",
      };

      function pad2(value) {
        return String(value).padStart(2, "0");
      }

      function escapeHtml(value) {
        return String(value || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function normalizeNameLabel(value, fallback = "Calendar") {
        const token = String(value || "").trim();
        return token || fallback;
      }

      function normalizeHexColor(rawColor, fallbackColor = "#ffa300") {
        const token = String(rawColor || "").trim();
        if (/^#([0-9a-fA-F]{6})$/.test(token)) return token.toLowerCase();
        if (/^#([0-9a-fA-F]{3})$/.test(token)) {
          const short = token.slice(1).toLowerCase();
          return `#${short[0]}${short[0]}${short[1]}${short[1]}${short[2]}${short[2]}`;
        }
        return fallbackColor;
      }

      function extractPublicHash(rawUrl) {
        const parsed = getValidatedSchedulerUrl(rawUrl);
        if (!parsed) return "";
        const parts = parsed.pathname.split("/").filter(Boolean);
        const schedulerIndex = parts.findIndex((part) => part.toLowerCase() === "scheduler");
        if (schedulerIndex < 0) return "";
        return String(parts[schedulerIndex + 1] || "").trim();
      }

      function parseTimeToMinutes(value) {
        const match = String(value || "").trim().match(/^(\d{2}):(\d{2})/);
        if (!match) return null;
        const hours = Number(match[1]);
        const minutes = Number(match[2]);
        if (!Number.isFinite(hours) || !Number.isFinite(minutes)) return null;
        return (hours * 60) + minutes;
      }

      function formatMinutesToTimeToken(totalMinutes) {
        let cursor = totalMinutes;
        while (cursor < 0) cursor += 24 * 60;
        while (cursor >= 24 * 60) cursor -= 24 * 60;
        return `${pad2(Math.floor(cursor / 60))}:${pad2(cursor % 60)}`;
      }

      function shiftTimeToken(timeToken, offsetMinutes) {
        const minutes = parseTimeToMinutes(timeToken);
        if (minutes === null) return String(timeToken || "");
        return formatMinutesToTimeToken(minutes + offsetMinutes);
      }

      function withinTimeWindow(timeToken, startMinutes, endMinutes) {
        const timeMinutes = parseTimeToMinutes(timeToken);
        if (timeMinutes === null) return false;
        if (startMinutes === null || endMinutes === null) return true;
        if (startMinutes <= endMinutes) return timeMinutes >= startMinutes && timeMinutes <= endMinutes;
        return timeMinutes >= startMinutes || timeMinutes <= endMinutes;
      }

      function toIsoDateFromParts(parts) {
        return `${parts.year}-${pad2(parts.month)}-${pad2(parts.day)}`;
      }

      function toIsoTimeFromParts(parts) {
        return `${pad2(parts.hour)}:${pad2(parts.minute)}`;
      }

      function toUtcDateFromIso(dateIso, timeToken) {
        const dateMatch = String(dateIso || "").trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
        const timeMatch = String(timeToken || "").trim().match(/^(\d{2}):(\d{2})$/);
        if (!dateMatch || !timeMatch) return null;
        const year = Number(dateMatch[1]);
        const month = Number(dateMatch[2]);
        const day = Number(dateMatch[3]);
        const hour = Number(timeMatch[1]);
        const minute = Number(timeMatch[2]);
        if (
          !Number.isFinite(year) ||
          !Number.isFinite(month) ||
          !Number.isFinite(day) ||
          !Number.isFinite(hour) ||
          !Number.isFinite(minute)
        ) {
          return null;
        }
        const utc = new Date(Date.UTC(year, month - 1, day, hour, minute, 0));
        if (Number.isNaN(utc.getTime())) return null;
        return utc;
      }

      function convertUtcSlotToRegionalTimes(dateIso, timeToken) {
        const utcDate = toUtcDateFromIso(dateIso, timeToken);
        if (!utcDate) return null;
        const fiParts = toPartsInTimeZone(utcDate, DEFAULT_TIMEZONE);
        const seParts = toPartsInTimeZone(utcDate, "Europe/Stockholm");
        return {
          fiDate: toIsoDateFromParts(fiParts),
          fiTime: toIsoTimeFromParts(fiParts),
          seTime: toIsoTimeFromParts(seParts),
        };
      }

      function toPartsInTimeZone(date, timeZone) {
        const formatter = new Intl.DateTimeFormat("sv-SE", {
          timeZone,
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hourCycle: "h23",
        });
        const parts = formatter.formatToParts(date);
        const map = Object.create(null);
        for (const part of parts) {
          map[part.type] = part.value;
        }
        return {
          year: Number(map.year),
          month: Number(map.month),
          day: Number(map.day),
          hour: Number(map.hour),
          minute: Number(map.minute),
          second: Number(map.second),
        };
      }

      function getRoundedHelsinkiNow() {
        const parts = toPartsInTimeZone(new Date(), DEFAULT_TIMEZONE);
        let hour = parts.hour;
        let minute = parts.minute;
        const rounded = Math.ceil(minute / 15) * 15;

        if (rounded >= 60) {
          hour += 1;
          minute = 0;
        } else {
          minute = rounded;
        }

        const utc = new Date(Date.UTC(parts.year, parts.month - 1, parts.day, hour, minute, 0));
        return {
          date: `${utc.getUTCFullYear()}-${pad2(utc.getUTCMonth() + 1)}-${pad2(utc.getUTCDate())}`,
          time: `${pad2(utc.getUTCHours())}:${pad2(utc.getUTCMinutes())}`,
        };
      }

      function normalizeStartDate(rawValue) {
        const raw = String(rawValue || "").trim();
        if (!raw) return "";
        const compact = raw.replace("T", " ").replace(/\s+/g, " ").trim();
        const match = compact.match(/^(\d{4}-\d{2}-\d{2})\s(\d{2}:\d{2})/);
        if (!match) return "";
        const [year, month, day] = match[1].split("-").map(Number);
        const [hour, minute] = match[2].split(":").map(Number);
        if (
          !Number.isFinite(year) ||
          !Number.isFinite(month) ||
          !Number.isFinite(day) ||
          !Number.isFinite(hour) ||
          !Number.isFinite(minute)
        ) {
          return "";
        }
        const utc = new Date(Date.UTC(year, month - 1, day, hour, minute, 0));
        if (Number.isNaN(utc.getTime())) return "";
        utc.setUTCMinutes(Math.round(utc.getUTCMinutes() / 15) * 15, 0, 0);
        return `${utc.getUTCFullYear()}-${pad2(utc.getUTCMonth() + 1)}-${pad2(utc.getUTCDate())} ${pad2(utc.getUTCHours())}:${pad2(utc.getUTCMinutes())}`;
      }

      function normalizeCalendarRecord(item, index) {
        return {
          id: String(item && item.id ? item.id : `calendar-${index + 1}`),
          name: String((item && item.name) || `Calendar ${index + 1}`),
          color: normalizeHexColor(item && item.color, COLOR_PALETTE[index % COLOR_PALETTE.length]),
          url: String((item && item.url) || "").trim(),
        };
      }

      function normalizeCalendarList(rawList) {
        if (!Array.isArray(rawList)) return [];
        return rawList.map((item, index) => normalizeCalendarRecord(item, index)).slice(0, 40);
      }

      async function loadCalendarsFromConfig() {
        try {
          const response = await fetch(`${CALENDARS_JSON_URL}?v=${Date.now()}`, {
            method: "GET",
            cache: "no-store",
          });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const parsed = await response.json();
          const normalized = normalizeCalendarList(parsed);
          if (normalized.length) {
            return { calendars: normalized, source: "repo" };
          }
          throw new Error("Empty calendar list");
        } catch {
          const fallback = normalizeCalendarList(FALLBACK_CALENDARS);
          return { calendars: fallback, source: "fallback" };
        }
      }

      function normalizeMonthKey(rawValue) {
        const token = String(rawValue || "").trim();
        if (!/^\d{4}-\d{2}$/.test(token)) return "";
        return token;
      }

      function getTodayDateIso() {
        return getRoundedHelsinkiNow().date;
      }

      function compareDateIso(left, right) {
        return String(left || "").localeCompare(String(right || ""));
      }

      function getDefaultDateForMonth(monthKey) {
        const normalizedMonth = normalizeMonthKey(monthKey);
        if (!normalizedMonth) return getTodayDateIso();
        const today = getTodayDateIso();
        if (toMonthKey(today) === normalizedMonth) return today;
        return `${normalizedMonth}-01`;
      }

      function shiftDateIsoDays(dateIso, delta) {
        const parts = String(dateIso || "").split("-").map(Number);
        if (parts.length !== 3 || parts.some((value) => !Number.isFinite(value))) return "";
        const utc = new Date(Date.UTC(parts[0], parts[1] - 1, parts[2], 0, 0, 0));
        utc.setUTCDate(utc.getUTCDate() + delta);
        return `${utc.getUTCFullYear()}-${pad2(utc.getUTCMonth() + 1)}-${pad2(utc.getUTCDate())}`;
      }

      function getMonthLastDate(monthKey) {
        const parts = String(monthKey || "").split("-").map(Number);
        if (parts.length !== 2 || parts.some((value) => !Number.isFinite(value))) return "";
        const utc = new Date(Date.UTC(parts[0], parts[1], 0, 0, 0, 0));
        return `${utc.getUTCFullYear()}-${pad2(utc.getUTCMonth() + 1)}-${pad2(utc.getUTCDate())}`;
      }

      function buildMonthAnchorStartDates(monthKey) {
        const normalizedMonth = normalizeMonthKey(monthKey);
        if (!normalizedMonth) return [];

        const monthStart = `${normalizedMonth}-01`;
        const monthEnd = getMonthLastDate(normalizedMonth);
        if (!monthEnd) return [];

        let cursor = monthStart;
        const today = getTodayDateIso();
        if (normalizedMonth === toMonthKey(today) && compareDateIso(cursor, today) < 0) {
          cursor = today;
        }

        const anchors = [];
        for (let guard = 0; guard < 8 && compareDateIso(cursor, monthEnd) <= 0; guard += 1) {
          const start = normalizeStartDate(`${cursor} 00:00`);
          if (start) anchors.push(start);
          cursor = shiftDateIsoDays(cursor, 7);
          if (!cursor) break;
        }
        return anchors;
      }

      function getInitialMonthKey() {
        const queryStart = normalizeStartDate(new URLSearchParams(window.location.search).get("startDate"));
        if (queryStart) return queryStart.slice(0, 7);
        return getTodayDateIso().slice(0, 7);
      }

      function getEffectiveStartDate() {
        const monthKey = normalizeMonthKey(state.visibleMonthKey) || getInitialMonthKey();
        const selectedInMonth = /^\d{4}-\d{2}-\d{2}$/.test(String(state.selectedDate || ""))
          && toMonthKey(state.selectedDate) === monthKey;
        let effectiveDate = selectedInMonth ? state.selectedDate : getDefaultDateForMonth(monthKey);
        const today = getTodayDateIso();
        if (monthKey === toMonthKey(today) && compareDateIso(effectiveDate, today) < 0) {
          effectiveDate = today;
        }
        return normalizeStartDate(`${effectiveDate} 00:00`);
      }

      function getValidatedSchedulerUrl(rawUrl) {
        const token = String(rawUrl || "").trim();
        if (!token) return "";
        try {
          const url = new URL(token);
          if (url.protocol !== "https:") return "";
          if (!url.pathname.toLowerCase().includes("/scheduler/")) return "";
          return url;
        } catch {
          return "";
        }
      }

      function withStartDate(rawUrl, startDate) {
        const url = getValidatedSchedulerUrl(rawUrl);
        if (!url) return "";
        url.searchParams.set("startDate", startDate);
        return url.toString();
      }

      function updateBrowserStart(startValue) {
        const normalized = normalizeStartDate(startValue);
        if (!normalized) return;

        const url = new URL(window.location.href);
        url.searchParams.set("startDate", normalized);
        window.history.replaceState({}, "", url.toString());
      }

      function renderAvailabilityLegend(items) {
        if (!items.length) {
          els.availabilityLegend.innerHTML = "";
          return;
        }
        els.availabilityLegend.innerHTML = items
          .map((item) => `<span class="legend-item"><span class="legend-dot" style="background:${item.color};"></span>${escapeHtml(item.person)}</span>`)
          .join("");
      }

      function getDistinctPersons(results) {
        const set = new Set();
        for (const result of results) {
          const person = normalizeNameLabel(result.person, "Calendar");
          set.add(person);
        }
        return [...set].sort((a, b) => a.localeCompare(b));
      }

      function syncSelectedPersons(persons) {
        if (!persons.length) {
          state.selectedPersons = new Set();
          state.personSelectionInitialized = false;
          return;
        }
        if (!state.personSelectionInitialized) {
          state.selectedPersons = new Set(persons);
          state.personSelectionInitialized = true;
          return;
        }
        const next = new Set();
        for (const person of persons) {
          if (state.selectedPersons.has(person)) next.add(person);
        }
        state.selectedPersons = next;
      }

      function renderPersonFilters(persons) {
        els.personFilterWrap.innerHTML = "";
        if (!persons.length) return;

        const actions = document.createElement("div");
        actions.className = "filter-actions";

        const allBtn = document.createElement("button");
        allBtn.type = "button";
        allBtn.className = "btn-mini";
        allBtn.textContent = "All";
        allBtn.addEventListener("click", () => {
          state.selectedPersons = new Set(persons);
          state.personSelectionInitialized = true;
          renderAvailabilityFromState();
        });

        const noneBtn = document.createElement("button");
        noneBtn.type = "button";
        noneBtn.className = "btn-mini";
        noneBtn.textContent = "None";
        noneBtn.addEventListener("click", () => {
          state.selectedPersons = new Set();
          state.personSelectionInitialized = true;
          renderAvailabilityFromState();
        });

        actions.appendChild(allBtn);
        actions.appendChild(noneBtn);
        els.personFilterWrap.appendChild(actions);

        for (const person of persons) {
          const label = document.createElement("label");
          label.className = "person-filter-item";

          const checkbox = document.createElement("input");
          checkbox.type = "checkbox";
          checkbox.checked = state.selectedPersons.has(person);
          checkbox.addEventListener("change", () => {
            if (checkbox.checked) {
              state.selectedPersons.add(person);
            } else {
              state.selectedPersons.delete(person);
            }
            state.personSelectionInitialized = true;
            renderAvailabilityFromState();
          });

          const text = document.createElement("span");
          text.textContent = person;
          label.appendChild(checkbox);
          label.appendChild(text);
          els.personFilterWrap.appendChild(label);
        }
      }

      function applyAvailabilityFilters(results) {
        return results
          .filter((result) => state.selectedPersons.has(normalizeNameLabel(result.person, "Calendar")))
          .map((result) => ({
            ...result,
            person: normalizeNameLabel(result.person, "Calendar"),
            slots: result.slots.filter((slot) => withinTimeWindow(slot.time, FI_BUSINESS_START_MINUTES, FI_BUSINESS_END_MINUTES)),
          }));
      }

      function parseDateKey(dateIso) {
        const parts = String(dateIso || "").split("-").map(Number);
        if (parts.length !== 3 || parts.some((value) => !Number.isFinite(value))) return null;
        return { year: parts[0], month: parts[1], day: parts[2] };
      }

      function toMonthKey(dateIso) {
        if (!/^\d{4}-\d{2}-\d{2}$/.test(String(dateIso || ""))) return "";
        return String(dateIso).slice(0, 7);
      }

      function shiftMonthKey(monthKey, delta) {
        const parts = String(monthKey || "").split("-").map(Number);
        if (parts.length !== 2 || parts.some((value) => !Number.isFinite(value))) return monthKey;
        const utc = new Date(Date.UTC(parts[0], parts[1] - 1, 1, 0, 0, 0));
        utc.setUTCMonth(utc.getUTCMonth() + delta);
        return `${utc.getUTCFullYear()}-${pad2(utc.getUTCMonth() + 1)}`;
      }

      function formatMonthLabel(monthKey) {
        const parts = String(monthKey || "").split("-").map(Number);
        if (parts.length !== 2 || parts.some((value) => !Number.isFinite(value))) return monthKey;
        const date = new Date(Date.UTC(parts[0], parts[1] - 1, 1, 0, 0, 0));
        return new Intl.DateTimeFormat("en-GB", { month: "long", year: "numeric", timeZone: "UTC" }).format(date);
      }

      function formatFullDayLabel(dateIso) {
        const parsed = parseDateKey(dateIso);
        if (!parsed) return dateIso;
        const date = new Date(Date.UTC(parsed.year, parsed.month - 1, parsed.day, 0, 0, 0));
        return new Intl.DateTimeFormat("en-GB", { weekday: "long", day: "numeric", month: "long", timeZone: "UTC" }).format(date);
      }

      function buildAvailabilityModel(results) {
        const byDate = new Map();
        const dateTotals = new Map();
        const personColors = new Map();

        for (const result of results) {
          const person = normalizeNameLabel(result.person, "Calendar");
          const color = normalizeHexColor(result.color, "#ffa300");
          if (!personColors.has(person)) personColors.set(person, color);

          for (const slot of result.slots) {
            const date = String(slot.date || "").trim();
            const time = String(slot.time || "").trim();
            const timeSe = String(slot.timeSe || "").trim();
            if (!date || !time) continue;

            if (!byDate.has(date)) byDate.set(date, new Map());
            const byPerson = byDate.get(date);
            if (!byPerson.has(person)) byPerson.set(person, []);
            byPerson.get(person).push({
              time,
              timeSe,
              bookingUrl: String(slot.bookingUrl || "").trim(),
            });
            dateTotals.set(date, (dateTotals.get(date) || 0) + 1);
          }
        }

        for (const byPerson of byDate.values()) {
          for (const slots of byPerson.values()) {
            slots.sort((left, right) => left.time.localeCompare(right.time));
          }
        }

        return { byDate, dateTotals, personColors };
      }

      function syncPlannerState(model) {
        const availableDates = [...model.byDate.keys()].sort((left, right) => left.localeCompare(right));
        if (!state.visibleMonthKey) state.visibleMonthKey = getInitialMonthKey();
        const fallbackDate = getDefaultDateForMonth(state.visibleMonthKey);

        if (!state.selectedDate || toMonthKey(state.selectedDate) !== state.visibleMonthKey) {
          const firstInMonth = availableDates.find((dateIso) => toMonthKey(dateIso) === state.visibleMonthKey);
          state.selectedDate = firstInMonth || fallbackDate;
        }
        if (state.selectedDate && !model.byDate.has(state.selectedDate)) {
          const firstInMonth = availableDates.find((dateIso) => toMonthKey(dateIso) === state.visibleMonthKey);
          state.selectedDate = firstInMonth || fallbackDate;
        }
      }

      function renderMonthPanel(model) {
        const monthKey = state.visibleMonthKey;
        const [year, month] = monthKey.split("-").map(Number);
        const first = new Date(Date.UTC(year, month - 1, 1, 0, 0, 0));
        const mondayOffset = (first.getUTCDay() + 6) % 7;
        const gridStart = new Date(first.getTime());
        gridStart.setUTCDate(gridStart.getUTCDate() - mondayOffset);

        const weekdayLabels = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
        const weekdayRow = weekdayLabels.map((label) => `<div class="month-weekday">${label}</div>`).join("");

        const cells = [];
        for (let index = 0; index < 42; index += 1) {
          const cellDate = new Date(gridStart.getTime());
          cellDate.setUTCDate(gridStart.getUTCDate() + index);
          const dateIso = `${cellDate.getUTCFullYear()}-${pad2(cellDate.getUTCMonth() + 1)}-${pad2(cellDate.getUTCDate())}`;
          const inMonth = cellDate.getUTCMonth() === (month - 1);
          const selected = dateIso === state.selectedDate;
          const slotCount = model.dateTotals.get(dateIso) || 0;
          const dayClasses = [
            "month-day",
            inMonth ? "" : "out-month",
            selected ? "selected" : "",
            slotCount ? "has-slots" : "",
          ].filter(Boolean).join(" ");
          cells.push(
            `<button class="${dayClasses}" type="button" data-date="${dateIso}">
              <span class="month-day-number">${cellDate.getUTCDate()}</span>
              <span class="month-day-count">${slotCount ? `${slotCount} free` : "No slots"}</span>
            </button>`,
          );
        }

        els.plannerMonth.innerHTML = `
          <div class="month-head">
            <button class="month-nav-btn" type="button" data-month-shift="-1" aria-label="Previous month">&#8249;</button>
            <h4 class="month-label">${escapeHtml(formatMonthLabel(monthKey))}</h4>
            <button class="month-nav-btn" type="button" data-month-shift="1" aria-label="Next month">&#8250;</button>
          </div>
          <div class="month-weekdays">${weekdayRow}</div>
          <div class="month-grid">${cells.join("")}</div>
        `;
      }

      function renderTimesPanel(model) {
        const selectedDate = state.selectedDate;
        const selectedLabel = selectedDate ? formatFullDayLabel(selectedDate) : "No day selected";
        const byPerson = model.byDate.get(selectedDate) || new Map();
        const personNames = [...state.selectedPersons].sort((left, right) => left.localeCompare(right));

        if (!selectedDate) {
          els.plannerTimes.innerHTML = `<div class="empty-calendar"><strong>No day selected.</strong><div>Choose a day from the month calendar.</div></div>`;
          return;
        }

        const columns = personNames.map((person) => {
          const color = model.personColors.get(person) || "#ffa300";
          const slots = (byPerson.get(person) || []).slice();
          const unique = [];
          const seen = new Set();
          for (const slot of slots) {
            const key = `${slot.time}|${slot.timeSe}|${slot.bookingUrl}`;
            if (seen.has(key)) continue;
            seen.add(key);
            unique.push(slot);
          }

          const slotMarkup = unique.length
            ? unique
              .map((slot) => {
                const fiTime = slot.time;
                const seTime = slot.timeSe || shiftTimeToken(slot.time, SE_TIME_OFFSET_MINUTES);
                if (!slot.bookingUrl) {
                  return `<div class="planner-time-empty">${escapeHtml(seTime)} SE / ${escapeHtml(fiTime)} FI</div>`;
                }
                return `<div class="planner-time-row">
                  <a class="planner-time-link" style="--chip-color:${color}; border-color:${color};" href="${escapeHtml(slot.bookingUrl)}" target="_blank" rel="noopener noreferrer">${escapeHtml(seTime)} SE</a>
                  <span class="planner-time-secondary">${escapeHtml(fiTime)} FI</span>
                </div>`;
              })
              .join("")
            : `<div class="planner-time-empty">No free times</div>`;

          return `
            <article class="planner-person-column">
              <div class="planner-person-head">
                <span class="legend-dot" style="background:${color};"></span>
                <span>${escapeHtml(person)}</span>
              </div>
              <div class="planner-time-list">${slotMarkup}</div>
            </article>
          `;
        }).join("");

        els.plannerTimes.innerHTML = `
          <h4 class="planner-day-title">${escapeHtml(selectedLabel)}</h4>
          <p class="planner-day-sub">Click a time to open the selected calendar in Pipedrive.</p>
          <div class="planner-time-columns">${columns || `<div class="empty-calendar"><strong>No names selected.</strong><div>Select one or more names from filters above.</div></div>`}</div>
        `;
      }

      function renderBookingPlanner(filtered) {
        const model = buildAvailabilityModel(filtered);
        syncPlannerState(model);
        renderTimesPanel(model);
        renderMonthPanel(model);
      }

      function renderAvailabilityFromState() {
        const results = state.availabilityResults;
        if (!results.length) {
          els.personFilterWrap.innerHTML = "";
          renderAvailabilityLegend([]);
          els.plannerTimes.innerHTML = `<div class="empty-calendar"><strong>No availability data yet.</strong><div>Use refresh after configuring scheduler links.</div></div>`;
          els.plannerMonth.innerHTML = `<div class="empty-calendar"><strong>No calendar data.</strong><div>Load calendars to show available dates.</div></div>`;
          els.availabilityStatus.innerHTML = `<strong>Waiting</strong> configure calendar links to load availability.`;
          state.selectedDate = "";
          state.visibleMonthKey = "";
          return;
        }

        const persons = getDistinctPersons(results);
        syncSelectedPersons(persons);
        renderPersonFilters(persons);

        const filtered = applyAvailabilityFilters(results);
        const legendByPerson = new Map();
        for (const item of filtered) {
          if (!legendByPerson.has(item.person)) {
            legendByPerson.set(item.person, item.color);
          }
        }
        const legendItems = [...legendByPerson.entries()].map(([person, color]) => ({ person, color }));
        renderAvailabilityLegend(legendItems);
        renderBookingPlanner(filtered);

        const totalSlots = results.reduce((sum, item) => sum + item.slots.length, 0);
        const visibleSlots = filtered.reduce((sum, item) => sum + item.slots.length, 0);
        const failed = results.filter((item) => item.error);
        const selectedCount = state.selectedPersons.size;

        if (failed.length) {
          const first = failed[0];
          els.availabilityStatus.innerHTML = `<strong class="danger">Partial</strong> showing ${visibleSlots}/${totalSlots} slot(s), ${selectedCount} name(s) selected. Business hours locked to FI ${FI_BUSINESS_LABEL} / SE ${SE_BUSINESS_LABEL}. ${failed.length} source(s) failed. First issue: ${escapeHtml(first.person)} (${escapeHtml(first.error)})`;
          return;
        }
        els.availabilityStatus.innerHTML = `<strong class="ok">Loaded</strong> showing ${visibleSlots}/${totalSlots} slot(s), ${selectedCount} name(s) selected. Business hours: FI ${FI_BUSINESS_LABEL} / SE ${SE_BUSINESS_LABEL}.`;
      }

      async function fetchCalendarAvailabilityChunk(calendar, startDate, fallbackColor) {
        const publicHash = extractPublicHash(calendar.url);
        const schedulerUrl = getValidatedSchedulerUrl(calendar.url);
        if (!schedulerUrl || !publicHash) {
          return {
            calendarId: calendar.id,
            person: normalizeNameLabel(calendar.name, "Calendar"),
            name: calendar.name,
            color: normalizeHexColor(calendar.color, fallbackColor),
            slots: [],
            error: "Invalid scheduler URL",
          };
        }

        const endpoint = `${schedulerUrl.origin}/scheduler/v1/availability/${encodeURIComponent(publicHash)}?start_date=${encodeURIComponent(startDate)}`;

        try {
          const response = await fetch(endpoint, { method: "GET", mode: "cors" });
          if (!response.ok) {
            return {
              calendarId: calendar.id,
              person: normalizeNameLabel(calendar.name, "Calendar"),
              name: calendar.name,
              color: normalizeHexColor(calendar.color, fallbackColor),
              slots: [],
              error: `HTTP ${response.status}`,
            };
          }

          const payload = await response.json();
          const rows = Array.isArray(payload?.data) ? payload.data : [];
          const slots = [];

          for (const row of rows) {
            const date = String(row?.date || "").trim();
            if (!date) continue;
            const timeslots = Array.isArray(row?.timeslots) ? row.timeslots : [];
            for (const slot of timeslots) {
              if (!slot?.available) continue;
              const time = String(slot?.time || "").trim();
              if (!time) continue;
              const converted = convertUtcSlotToRegionalTimes(date, time);
              if (!converted) continue;
              const slotStart = normalizeStartDate(`${date} ${time}`);
              const bookingUrl = slotStart ? withStartDate(calendar.url, slotStart) : withStartDate(calendar.url, startDate);
              slots.push({
                date: converted.fiDate,
                time: converted.fiTime,
                timeSe: converted.seTime,
                bookingUrl,
              });
            }
          }

          return {
            calendarId: calendar.id,
            person: normalizeNameLabel(calendar.name, "Calendar"),
            name: calendar.name || "Calendar",
            color: normalizeHexColor(calendar.color, fallbackColor),
            slots,
            error: "",
          };
        } catch (error) {
          return {
            calendarId: calendar.id,
            person: normalizeNameLabel(calendar.name, "Calendar"),
            name: calendar.name,
            color: normalizeHexColor(calendar.color, fallbackColor),
            slots: [],
            error: error instanceof Error ? error.message : "Fetch failed",
          };
        }
      }

      async function fetchCalendarAvailability(calendar, monthKey, fallbackColor) {
        const anchors = buildMonthAnchorStartDates(monthKey);
        if (!anchors.length) {
          return {
            calendarId: calendar.id,
            person: normalizeNameLabel(calendar.name, "Calendar"),
            name: calendar.name,
            color: normalizeHexColor(calendar.color, fallbackColor),
            slots: [],
            error: "No valid month anchor dates",
          };
        }

        const chunks = await Promise.all(
          anchors.map((startDate) => fetchCalendarAvailabilityChunk(calendar, startDate, fallbackColor)),
        );

        const slots = [];
        const seen = new Set();
        const errors = [];
        let base = null;

        for (const chunk of chunks) {
          if (!base) base = chunk;
          if (chunk.error) errors.push(chunk.error);
          for (const slot of chunk.slots || []) {
            const key = `${slot.date}|${slot.time}|${slot.bookingUrl || ""}`;
            if (seen.has(key)) continue;
            seen.add(key);
            slots.push(slot);
          }
        }

        slots.sort((left, right) => {
          const dateCompare = String(left.date || "").localeCompare(String(right.date || ""));
          if (dateCompare) return dateCompare;
          return String(left.time || "").localeCompare(String(right.time || ""));
        });

        return {
          calendarId: base?.calendarId || calendar.id,
          person: base?.person || normalizeNameLabel(calendar.name, "Calendar"),
          name: base?.name || calendar.name || "Calendar",
          color: base?.color || normalizeHexColor(calendar.color, fallbackColor),
          slots,
          error: errors.length ? `Anchors failed: ${errors.length}/${anchors.length}` : "",
        };
      }

      async function refreshUnifiedAvailability() {
        const start = getEffectiveStartDate();
        if (!start) return;
        updateBrowserStart(start);
        const monthKey = normalizeMonthKey(state.visibleMonthKey) || getInitialMonthKey();

        const requestId = ++state.availabilityRequestId;
        els.availabilityStatus.innerHTML = `<strong>Loading</strong> unified availability from configured calendars...`;

        const calendars = state.calendars.filter((calendar) => String(calendar.url || "").trim());
        if (!calendars.length) {
          state.availabilityResults = [];
          state.selectedPersons = new Set();
          state.personSelectionInitialized = false;
          state.selectedDate = "";
          els.availabilityStatus.innerHTML = `<strong class="danger">No calendars configured</strong> Add scheduler URLs to load unified availability.`;
          els.plannerTimes.innerHTML = `<div class="empty-calendar"><strong>No sources configured.</strong><div>Add at least one scheduler URL in the source list.</div></div>`;
          els.plannerMonth.innerHTML = `<div class="empty-calendar"><strong>No calendar data.</strong><div>Add linked calendars to load days.</div></div>`;
          els.availabilityLegend.innerHTML = "";
          els.personFilterWrap.innerHTML = "";
          return;
        }

        const results = await Promise.all(
          calendars.map((calendar, index) => fetchCalendarAvailability(calendar, monthKey, COLOR_PALETTE[index % COLOR_PALETTE.length])),
        );

        if (requestId !== state.availabilityRequestId) return;
        state.availabilityResults = results;
        renderAvailabilityFromState();
      }

      async function reloadCalendarsFromSource(showStatusMessage = false) {
        const { calendars, source } = await loadCalendarsFromConfig();
        state.calendars = calendars;
        state.availabilityResults = [];
        state.selectedPersons = new Set();
        state.personSelectionInitialized = false;
        const monthKey = normalizeMonthKey(state.visibleMonthKey) || getInitialMonthKey();
        state.selectedDate = getDefaultDateForMonth(monthKey);
        await refreshUnifiedAvailability();
        if (showStatusMessage && els.saveStatus) {
          const sourceLabel = source === "repo" ? "GitHub config" : "fallback defaults";
          els.saveStatus.innerHTML = `<strong class="ok">Loaded</strong> ${state.calendars.length} calendar row(s) from ${sourceLabel}.`;
        }
      }

      async function copyShareLink() {
        const start = getEffectiveStartDate();
        if (!start) return;
        const url = new URL(window.location.href);
        url.searchParams.set("startDate", start);
        try {
          await navigator.clipboard.writeText(url.toString());
          if (els.saveStatus) {
            els.saveStatus.innerHTML = `<strong class="ok">Copied</strong> share link for month ${escapeHtml(start.slice(0, 7))}.`;
          }
        } catch {
          if (els.saveStatus) {
            els.saveStatus.innerHTML = `<strong class="danger">Copy failed</strong> Clipboard permission denied.`;
          }
        }
      }

      function bindEvents() {
        if (els.copyLinkBtn) {
          els.copyLinkBtn.addEventListener("click", copyShareLink);
        }
        els.refreshAvailabilityBtn.addEventListener("click", () => {
          void refreshUnifiedAvailability();
        });
        els.plannerMonth.addEventListener("click", (event) => {
          const shiftButton = event.target.closest("[data-month-shift]");
          if (shiftButton) {
            const delta = Number(shiftButton.dataset.monthShift || "0");
            if (!Number.isFinite(delta) || !delta) return;
            const current = normalizeMonthKey(state.visibleMonthKey) || getInitialMonthKey();
            state.visibleMonthKey = shiftMonthKey(current, delta);
            state.selectedDate = getDefaultDateForMonth(state.visibleMonthKey);
            void refreshUnifiedAvailability();
            return;
          }

          const dayButton = event.target.closest("[data-date]");
          if (!dayButton) return;
          const dateIso = String(dayButton.dataset.date || "").trim();
          if (!/^\d{4}-\d{2}-\d{2}$/.test(dateIso)) return;
          const nextMonth = toMonthKey(dateIso);
          const monthChanged = nextMonth && nextMonth !== state.visibleMonthKey;
          state.selectedDate = dateIso;
          state.visibleMonthKey = nextMonth || state.visibleMonthKey;
          if (monthChanged) {
            void refreshUnifiedAvailability();
            return;
          }
          renderAvailabilityFromState();
        });
      }

      async function init() {
        state.visibleMonthKey = getInitialMonthKey();
        state.selectedDate = getDefaultDateForMonth(state.visibleMonthKey);
        const start = getEffectiveStartDate();
        if (start) updateBrowserStart(start);
        bindEvents();
        await reloadCalendarsFromSource(false);
      }

      void init();
    })();
  </script>
